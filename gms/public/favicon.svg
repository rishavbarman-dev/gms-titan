<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b3b" />
      <stop offset="50%" stop-color="#ff6b3b" />
      <stop offset="100%" stop-color="#ff3b86" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff3b3b" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="24" height="24" rx="6" fill="#0c0c0e" />
  <g filter="url(#shadow)">
    <!-- Dumbbell Bar -->
    <rect x="5" y="10.5" width="14" height="3" rx="1" fill="url(#neonGlow)" />
    <!-- Left Weight Plates -->
    <rect x="3" y="6" width="2" height="12" rx="1" fill="url(#neonGlow)" />
    <rect x="1" y="8" width="2" height="8" rx="0.5" fill="url(#neonGlow)" opacity="0.8" />
    <!-- Right Weight Plates -->
    <rect x="19" y="6" width="2" height="12" rx="1" fill="url(#neonGlow)" />
    <rect x="21" y="8" width="2" height="8" rx="0.5" fill="url(#neonGlow)" opacity="0.8" />
    <!-- Middle Grip Accents -->
    <circle cx="12" cy="12" r="1.5" fill="#ffffff" />
  </g>
</svg>